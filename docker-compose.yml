services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ems_security_office
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - ems_network

  nginx:
    image: nginx:alpine
    container_name: ems_security_office_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ems_network

networks:
  ems_network:
    driver: bridge