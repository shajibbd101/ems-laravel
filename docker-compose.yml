services:
  # =============================================
  # PHP Application
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-app
    container_name: ems_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stderr
      - DB_CONNECTION=mysql
      - DB_HOST=192.168.1.168
      - DB_PORT=3310
      - DB_DATABASE=security_office
      - DB_USERNAME=root
      - DB_PASSWORD=shajib01
    volumes:
      - .:/var/www
      - storage:/var/www/storage
      - cache:/var/www/bootstrap/cache
    networks:
      - ems_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # =============================================
  # Nginx Web Server
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: ems_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - storage:/var/www/storage:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - ems_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

networks:
  ems_network:
    driver: bridge

volumes:
  storage:
  cache: